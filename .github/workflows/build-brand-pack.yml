name: Build & Publish Brand Pack

on:
  push:
    branches:
      - main

# Builds the brand pack and uploads it straight to the S3 bucket that backs
# brand.avagolf.com. The zip is intentionally NOT committed to the site repo:
# it is a large out-of-band binary, so it never touches git/LFS.
#
# It MUST live under the files/ prefix. The site deploy (main.yml) excludes
# files/* from its `--delete` sync so it survives, and the Fastly config only
# enables segmented caching + the Range-capable S3 REST backend for
# `^/files/.*\.zip$`. Anything larger than ~20MB served from any other path
# 503s ("Response object too large") because Fastly can't buffer it.
#
# Public URL: https://brand.avagolf.com/files/AVA_Golf_Brand_Pack.zip

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |
          zip -r "$RUNNER_TEMP/AVA_Golf_Brand_Pack.zip" . \
            --exclude "*.git*" \
            --exclude ".github/*"
          echo "Build complete:"
          ls -lh "$RUNNER_TEMP/AVA_Golf_Brand_Pack.zip"

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.S3_BUCKET_REGION }}
        run: |
          aws s3 cp "$RUNNER_TEMP/AVA_Golf_Brand_Pack.zip" \
            s3://brand.avagolf.com/files/AVA_Golf_Brand_Pack.zip \
            --acl public-read \
            --content-type application/zip \
            --cache-control "public, max-age=300"

      # Cache purges are best-effort: S3 is the source of truth and the short
      # max-age above lets any stale edge copy self-heal within 5 minutes.
      - name: Invalidate Fastly
        continue-on-error: true
        uses: jcoene/fastly-purge-action@master
        with:
          api_key: "${{ secrets.FASTLY_API_KEY }}"
          service_id: "iN42g1xAhUJCEMKjylOpRW"

      - name: Purge Cloudflare Cache
        continue-on-error: true
        uses: nathanvaughn/actions-cloudflare-purge@master
        with:
          cf_zone: "e690f4cbe14dc74233ccb7b3a76749cc"
          cf_auth: ${{ secrets.CLOUDFLARE_PURGE_CACHE_API }}
