name: Build & Publish Brand Pack

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Build zip
        run: |
          cd source
          zip -r ../AVA_Golf_Brand_Pack.zip . \
            --exclude "*.git*" \
            --exclude ".github/*"
          echo "Build complete: AVA_Golf_Brand_Pack.zip"

      - name: Checkout output repo
        uses: actions/checkout@v4
        with:
          repository: AVAGolf/brand.avagolf.com
          token: ${{ secrets.BRAND_DIST_PAT }}
          path: dist

      - name: Copy zip into output repo
        run: |
          mkdir -p dist/public
          cp AVA_Golf_Brand_Pack.zip dist/public/AVA_Golf_Brand_Pack.zip

      - name: Commit and push to output repo
        run: |
          cd dist
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/AVA_Golf_Brand_Pack.zip
          git diff --cached --quiet || git commit -m "chore: update brand pack [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push